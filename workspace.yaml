# workspace.yaml — komet-ws
# ══════════════════════════════
#
# komet-ws
#
# Bootstrap:
#   git clone https://github.com/<org>/komet-ws.git
#   cd komet-ws
#   mvn ws:init
#   mvn clean install

schema-version: "1.0"
generated: 2026-04-07

defaults:
  branch: main
  maven-version: "4.0.0-rc-5"

component-types:
  software:
    description: "Java libraries and applications"
    build-command: "mvn clean install"
    checkpoint-mechanism: git-tag

components:
  # Add components with: mvn ws:add -Drepo=<git-url>

  ike-bom:
    type: software
    description: >
      ike-bom component.
    repo: https://github.com/knowledge-graphlet/ike-bom.git
    version: "3.0.7-SNAPSHOT"
    groupId: dev.ikm.ike
    depends-on: []

  tinkar-core:
    type: software
    description: >
      tinkar-core component.
    repo: https://github.com/ikmdev/tinkar-core.git
    version: "1.127.2-SNAPSHOT"
    groupId: dev.ikm.tinkar
    depends-on: []

  tinkar-composer:
    type: software
    description: >
      tinkar-composer component.
    repo: https://github.com/ikmdev/tinkar-composer.git
    version: "1.14.0-SNAPSHOT"
    groupId: dev.ikm.tinkar
    depends-on:
      - component: tinkar-core
        relationship: build
        version-property: tinkar-core.version

groups:
  all: [ike-bom, tinkar-core, tinkar-composer]
