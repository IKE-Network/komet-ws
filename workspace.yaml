# workspace.yaml — komet-ws
# ══════════════════════════════
#
# komet-ws
#
# Bootstrap:
#   git clone https://github.com/<org>/komet-ws.git
#   cd komet-ws
#   mvn ws:init
#   mvn clean install

schema-version: "1.0"
generated: 2026-04-07

defaults:
  branch: main
  maven-version: "4.0.0-rc-5"

component-types:
  software:
    description: "Java libraries and applications"
    build-command: "mvn clean install"
    checkpoint-mechanism: git-tag

components:
  # Add components with: mvn ws:add -Drepo=<git-url>


  tinkar-core:
    type: software
    description: >
      tinkar-core component.
    repo: https://github.com/ikmdev/tinkar-core.git
    branch: main
    version: "1.127.2-SNAPSHOT"
    groupId: dev.ikm.tinkar
    depends-on:
      - component: komet-bom
        relationship: build

  tinkar-composer:
    type: software
    description: >
      tinkar-composer component.
    repo: https://github.com/ikmdev/tinkar-composer.git
    branch: main
    version: "1.14.0-SNAPSHOT"
    groupId: dev.ikm.tinkar
    depends-on:
      - component: tinkar-core
        relationship: build
        version-property: tinkar-core.version

  rocks-kb:
    type: software
    description: >
      rocks-kb component.
    repo: https://github.com/ikmdev/rocks-kb.git
    branch: main
    version: "0.1.0-SNAPSHOT"
    groupId: dev.ikm.ike
    depends-on:
      - component: komet-bom
        relationship: build
      - component: tinkar-core
        relationship: build

  komet:
    type: software
    description: >
      komet component.
    repo: https://github.com/ikmdev/komet.git
    branch: main
    version: "1.59.0-SNAPSHOT"
    groupId: dev.ikm.komet
    depends-on:
      - component: komet-bom
        relationship: build
      - component: tinkar-core
        relationship: build
      - component: tinkar-composer
        relationship: build

  komet-desktop:
    type: software
    description: >
      komet-desktop component.
    repo: https://github.com/ikmdev/komet-desktop.git
    branch: main
    version: "3.0.0-SNAPSHOT"
    groupId: dev.ikm.ike
    depends-on:
      - component: komet-bom
        relationship: build
      - component: tinkar-core
        relationship: build
      - component: tinkar-composer
        relationship: build
      - component: rocks-kb
        relationship: build
      - component: komet
        relationship: build

  komet-bom:
    type: software
    description: >
      komet-bom component.
    repo: https://github.com/ikmdev/komet-bom.git
    branch: main
    version: "3.0.7-SNAPSHOT"
    groupId: dev.ikm.komet
    depends-on: []

groups:
  all: [tinkar-core, tinkar-composer, rocks-kb, komet, komet-desktop, komet-bom]

# IntelliJ project settings shared across collaborators. Enforced by
# ws:upgrade-publish on every run (updates .idea/misc.xml).
# komet-ws uses --enable-preview, so language level must be *_PREVIEW.
ide:
  language-level: JDK_25_PREVIEW
